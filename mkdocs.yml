site_name: Incheon Port Cut-off Risk Radar
site_url: https://yeongseon.github.io/incheon-port-cutoff-radar/
site_description: 인천항 반입 cut-off 리스크 예측 MVP 문서
site_author: yeongseon
repo_url: https://github.com/yeongseon/incheon-port-cutoff-radar
repo_name: yeongseon/incheon-port-cutoff-radar

theme:
  name: material
  language: ko
  palette:
    scheme: default
    primary: white
    accent: blue
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - en
        - ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/incheon-port-cutoff-radar

nav:
  - Home: index.md
  - Specs:
      - Project Overview: specs/00_project_overview.md
      - PRD: specs/01_prd.md
      - MVP Spec: specs/02_mvp_spec.md
      - Architecture: specs/03_architecture.md
      - Data Spec: specs/04_data_spec.md
      - API Spec: specs/05_api_spec.md
      - DB Schema: specs/06_db_schema.md
      - Frontend Spec: specs/07_frontend_spec.md
      - Backend Spec: specs/08_backend_spec.md
      - Dev Plan: specs/09_dev_plan.md
      - Test Plan: specs/10_test_plan.md
      - Risks & Decisions: specs/11_risk_and_decisions.md
      - Pitch One-Pager: specs/12_pitch_one_pager.md
  - Guide:
      - Quick Start: guide/quickstart.md
      - API Reference: guide/api.md
      - Risk Engine: guide/engine.md
  - Demo: demo.md
